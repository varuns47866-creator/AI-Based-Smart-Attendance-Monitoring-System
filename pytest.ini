[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    # Ignore StarletteDeprecationWarning from starlette's own status.py (not our code)
    # StarletteDeprecationWarning extends UserWarning, not DeprecationWarning
    ignore:.*HTTP_422_UNPROCESSABLE_ENTITY.*:UserWarning
